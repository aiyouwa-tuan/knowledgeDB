<style id="sq-home-btn-style">
  .sq-home-btn{
    position:fixed;top:16px;left:16px;z-index:99999;
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 13px 7px 11px;border-radius:999px;
    background:rgba(15,15,17,.78);
    -webkit-backdrop-filter:saturate(180%) blur(14px);
    backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(255,255,255,.12);
    color:#fafafa;text-decoration:none;
    font:500 12.5px/1 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    letter-spacing:.01em;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
    transition:transform .18s ease,background .18s ease,box-shadow .18s ease;
    cursor:pointer
  }
  .sq-home-btn:hover{transform:translateY(-1px);background:rgba(15,15,17,.92);box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .sq-home-btn:active{transform:translateY(0)}
  .sq-home-btn svg{width:13px;height:13px;flex-shrink:0;transition:transform .18s ease}
  .sq-home-btn:hover svg{transform:translateX(-2px)}
  .sq-home-btn b{font-weight:500}
  .sq-home-btn em{font-style:normal;opacity:.62;font-weight:400}
  @media (max-width:600px){
    .sq-home-btn{top:12px;left:12px;padding:7px 11px}
    .sq-home-btn .sq-label{display:none}
  }
  @media print{ .sq-home-btn{display:none} }
</style>

)})]})]})}function C(){let[e,t]=(0,i.useState)(""),[n,r]=(0,i.useState)("全部"),l=[{term:"Token",en:"Token",cat:"模型概念",level:"入门",color:"#60a5fa",short:"LLM 处理的最小单位，约等于 0.75 个英文单词或 1.5 个中文汉字",detail:'不是字符，不是单词，而是 BPE（字节对编码）切分后的子词片段。GPT-4 的词表约有 10 万个 Token。"你好世界"可能被切成 4 个 Token。价格按 Token 计费，1M Token ≈ 75 万英文单词。'},{term:"上下文窗口",en:"Context Window",cat:"模型概念",level:"入门",color:"#60a5fa",short:'模型一次能"看到"的最大 Token 数量，决定了能处理多长的文本',detail:'GPT-4 Turbo 支持 128K tokens（约 10 万汉字），Claude 3 支持 200K tokens。越长的上下文窗口意味着更高的推理成本（注意力计算是 O(n²)）。"长上下文"是目前各家竞争的核心指标之一。'},{term:"参数量",en:"Parameters",cat:"模型概念",level:"入门",color:"#60a5fa",short:"模型中可学习权重的数量，常用 B（十亿）衡量，如 7B、70B、1.75T",detail:'参数量决定模型的"容量"，但不直接等于能力。7B 模型精调后可超越未精调的 70B。GPT-3 有 175B 参数，GPT-4 据估计约 1.8T（MoE 架构，实际激活约 200B）。参数量 × 精度（fp16=2字节）≈ 显存占用。'},{term:"推理 vs 训练",en:"Inference vs Training",cat:"模型概念",level:"入门",color:"#60a5fa",short:"训练=让模型学习（一次性成本）；推理=调用模型回答（持续成本）",detail:"一次 GPT-4 训练成本估计超 1 亿美元；每次推理成本约 $0.01~0.03。训练拼算力，推理拼效率（量化、蒸馏、MoE）。对于 To B/To C 产品，推理成本是主要运营支出（COGS）。"},{term:"基座模型 vs 对齐模型",en:"Base vs Instruct/Chat",cat:"模型概念",level:"入门",color:"#60a5fa",short:'基座模型是"文字续写机"，对齐模型经过 SFT+RLHF 变成可对话的助手',detail:'GPT-4 Base → GPT-4（Instruct 版）。基座模型给开发者用（可微调），Chat 版给终端用户用。许多公司会在开源基座模型上做微调做私有化部署，避免"从头预训练"的天价成本。'},{term:"Embedding（嵌入）",en:"Embedding",cat:"模型概念",level:"进阶",color:"#60a5fa",short:"将文本、图片等转化为高维向量，使得语义相近的内容在向量空间距离更近",detail:"RAG 的核心基础设施。OpenAI text-embedding-3-large 输出 3072 维向量。用于语义搜索、推荐系统、相似度匹配。向量数据库（Pinecone、Milvus、Chroma）存储和检索这些向量。"},{term:"Prompt（提示词）",en:"Prompt",cat:"模型概念",level:"入门",color:"#60a5fa",short:"输入给模型的文本指令，是人机交互的核心接口",detail:"System Prompt（系统提示）设定角色和规则；User Prompt 是用户输入；Assistant 是模型回答。Prompt Engineering（提示词工程）是门学问。越好的模型对 Prompt 要求越低（鲁棒性强）。"},{term:"Fine-tuning（微调）",en:"Fine-tuning",cat:"训练术语",level:"进阶",color:"#34d399",short:"在预训练模型基础上，用特定领域数据继续训练，使模型适应特定任务",detail:"全量微调（Full Fine-tuning）成本高；LoRA/QLoRA 是轻量微调方案，只训练少量适配器参数（约 0.1% 参数量），大幅降低成本。垂直行业落地的主流方法。"},{term:"LoRA",en:"Low-Rank Adaptation",cat:"训练术语",level:"进阶",color:"#34d399",short:'低秩适配——只训练少量可插拔的"适配器"参数，实现高效微调',detail:"核心思想：权重更新矩阵可以分解为两个低秩矩阵的乘积（ΔW = AB），大幅减少可训练参数。QLoRA 在此基础上加量化，4bit 量化的 70B 模型可在消费级 GPU 上微调。是当前私有化部署最主流的方案。"},{term:"量化（Quantization）",en:"Quantization",cat:"训练术语",level:"进阶",color:"#34d399",short:"降低模型权重的数值精度（如从 FP32→INT4），大幅减少显存和推理成本",detail:"精度梯队：FP32(4字节) → FP16(2字节) → INT8(1字节) → INT4(0.5字节)。量化越激进，速度越快，显存越小，但精度损失越大。GPTQ、AWQ、GGUF 是主流量化格式。llama.cpp 让 70B 模型跑在 MacBook 上成为可能。"},{term:"RLHF",en:"Reinforcement Learning from Human Feedback",cat:"训练术语",level:"进阶",color:"#34d399",short:"用人类偏好反馈训练奖励模型，再用强化学习优化 LLM 的输出质量",detail:"ChatGPT 成功的关键技术。流程：人工排序回答 → 训练奖励模型（RM）→ PPO 强化学习优化。缺点：训练复杂、成本高、奖励黑客风险。DPO 是更简洁的替代方案，已成为主流。"},{term:"SFT",en:"Supervised Fine-Tuning",cat:"训练术语",level:"进阶",color:"#34d399",short:'监督微调——用高质量的指令-回答对，教会模型"怎么回答问题"',detail:"预训练后的第一步对齐。数据质量远比数量重要：1000 条精选数据 > 100 万条低质数据。Alpaca、ShareGPT 等数据集是开源 SFT 的基础。中文模型的 SFT 数据质量是当前竞争焦点。"},{term:"Scaling Law（规模定律）",en:"Scaling Law",cat:"训练术语",level:"进阶",color:"#34d399",short:"模型性能与参数量、数据量、算力呈稳定的幂律关系——越大越好",detail:"Kaplan 2020 年发现，Chinchilla 2022 修正（最优模型：参数量翻倍时，数据量也要翻倍）。Scaling Law 是大模型投资逻辑的核心假设：买更多 GPU，训更大模型，能力就会提升。争议点：这个规律在何时会失效？"},{term:"Distillation（蒸馏）",en:"Knowledge Distillation",cat:"训练术语",level:"进阶",color:"#34d399",short:"用大模型（Teacher）生成的数据训练小模型（Student），实现能力迁移",detail:"DeepSeek R1 发布后，蒸馏技术成为热点——用 R1 的推理数据训练 7B/14B 小模型，小模型的推理能力接近大模型。这引发了激烈的法律和伦理争议（OpenAI 的 ToS 禁止此行为）。"},{term:"KV Cache",en:"Key-Value Cache",cat:"工程部署",level:"进阶",color:"#f59e0b",short:"推理时缓存已计算的注意力键值对，避免重复计算，大幅提升生成速度",detail:"让 LLM 能快速生成 Token 的关键优化。KV Cache 的大小 = batch_size × seq_len × num_layers × num_heads × head_dim × 2。长上下文 + 大 batch 会撑爆显存。PagedAttention（vLLM 的核心创新）解决了 KV Cache 的内存碎片问题。"},{term:"vLLM",en:"vLLM",cat:"工程部署",level:"进阶",color:"#f59e0b",short:"目前最流行的开源 LLM 推理框架，吞吐量比 Hugging Face 原生高 20x+",detail:"UC Berkeley 出品，PagedAttention + Continuous Batching 两大创新。支持多种量化格式，兼容 OpenAI API 格式，是私有化部署的事实标准。竞品：TensorRT-LLM（NVIDIA）、TGI（Hugging Face）。"},{term:"GPU 利用率",en:"GPU Utilization / MFU",cat:"工程部署",level:"专家",color:"#f59e0b",short:"MFU（模型浮点利用率）是衡量训练效率的关键指标，业界领先约 35-55%",detail:"A100 峰值算力 312 TFLOPS，但实际训练利用率通常只有 35~55%（因通信、内存传输等开销）。提升 MFU 是节省训练成本的核心工作。Flash Attention 通过减少内存读写显著提升 MFU。"},{term:"推理延迟 TTFT/TPS",en:"TTFT / Tokens Per Second",cat:"工程部署",level:"进阶",color:"#f59e0b",short:"TTFT（首 Token 延迟）和 TPS（每秒生成速度）是推理性能的两大核心指标",detail:"TTFT（Time To First Token）影响用户体验，要求 <1 秒；TPS 决定吞吐量和成本。流式输出（Streaming）可掩盖 TTFT 问题。投资 AI 基础设施公司时，这是核心技术指标。"},{term:"API vs 私有化部署",en:"API vs On-premise",cat:"工程部署",level:"入门",color:"#f59e0b",short:"调用云端 API（简单但数据出境）vs 在自己服务器部署模型（复杂但数据安全）",detail:"金融、医疗、政务等行业强制要求数据不出境，必须私有化部署。私有化用开源模型（LLaMA、Qwen、DeepSeek）。私有化部署服务商是当前 To B AI 的重要赛道。"},{term:"MMLU",en:"Massive Multitask Language Understanding",cat:"评测基准",level:"进阶",color:"#a78bfa",short:"覆盖57个学科的综合知识测试，是衡量模型知识广度的标准基准",detail:"包含数学、法律、医学、历史等57个领域的选择题。GPT-4 约 87%，人类专家约 89%。缺点：题目已被大量训练数据污染，高分不一定代表真实能力（数据污染/数据泄露问题）。"},{term:"HumanEval / SWE-bench",en:"HumanEval / SWE-bench",cat:"评测基准",level:"进阶",color:"#a78bfa",short:"代码能力评测：HumanEval 测函数编写，SWE-bench 测解决真实 GitHub Issue",detail:"SWE-bench 是当前最难的代码评测，要求在真实代码仓库中修复 Bug，Claude 3.7 Sonnet 约 70%。这是 AI 代码能力最权威的评测，投资 AI 编程工具时必看。"},{term:"LMSYS Chatbot Arena",en:"Chatbot Arena / ELO",cat:"评测基准",level:"进阶",color:"#a78bfa",short:"盲测擂台赛——用户同时问两个匿名模型，选更好的答案，积累 ELO 排名",detail:'被认为是最接近真实用户体验的评测。GPT-4o、Claude 3.5 长期霸榜。但也有争议：用户偏好不等于客观能力，且容易受"格式好看"等表面因素影响。'},{term:"Benchmark 污染",en:"Data Contamination",cat:"评测基准",level:"专家",color:"#a78bfa",short:'训练数据中包含测试集题目，导致模型在评测上"超常发挥"，失去参考价值',detail:'几乎所有公开 Benchmark 都面临污染问题。2024年后，"私密评测集"（如 LiveBench 月更题目）成为趋势。投资时需警惕公司用污染了的 Benchmark 来夸大模型能力。'},{term:"Vibe Coding",en:"Vibe Coding",cat:"行业黑话",level:"入门",color:"#e879f9",short:'用 AI 辅助编程，靠"感觉"而非精确控制，通常指 Cursor/Copilot 辅助开发',detail:"Andrej Karpathy 2025年创造的词。描述：用自然语言描述需求，让 AI 生成代码，自己做少量调整。争议：降低了编程门槛，但可能导致代码质量问题。投资人常用此词描述 AI 编程工具市场。"},{term:"AI 原生",en:"AI Native",cat:"行业黑话",level:"入门",color:"#e879f9",short:"从一开始就将 AI 深度嵌入产品核心流程，而非在已有产品上叠加 AI 功能",detail:'对比：传统软件"加一个 AI 功能"vs AI Native "整个产品以 AI 为核心重新设计"。Cursor 是 AI Native 代码编辑器；Notion AI 是在已有产品上叠 AI。AI Native 产品通常有更高的护城河。'},{term:"幻觉（Hallucination）",en:"Hallucination",cat:"行业黑话",level:"入门",color:"#e879f9",short:"模型一本正经地生成错误事实，如虚假引用、编造数据、捏造人物",detail:'是 LLM 最核心的缺陷之一。"hallucinate"在 AI 圈是动词，意为"模型编造了"。RAG 和更好的训练可以减少但无法完全消除。法律、医疗场景下幻觉问题尤为致命。'},{term:"护城河（Moat）",en:"Moat",cat:"行业黑话",level:"入门",color:"#e879f9",short:"AI 公司的竞争壁垒——数据、算力、人才、生态，哪个才是真正的护城河？",detail:"当前行业争议：底层模型能力快速收敛（开源追平闭源），护城河在哪里？主流观点：数据飞轮（用户使用产生数据，数据改进模型）> 模型能力本身。Cursor 的护城河是用户习惯，不是模型。"},{term:"飞轮效应",en:"Data Flywheel",cat:"行业黑话",level:"入门",color:"#e879f9",short:"用户使用产生数据 → 数据改进模型 → 更好的模型吸引更多用户 → 循环",detail:"AI 产品的核心竞争优势。OpenAI 有 1 亿用户的反馈数据，这是其他竞争者无法复制的。中国公司的数据飞轮通常限于中文场景。To B 产品的飞轮：客户的私有数据 + 使用反馈。"},{term:"AGI / ASI",en:"Artificial General / Super Intelligence",cat:"行业黑话",level:"入门",color:"#e879f9",short:"AGI=通用人工智能（能做人类任何脑力工作）；ASI=超级智能（远超人类）",detail:'OpenAI 定义 AGI 为"在大多数经济有价值任务上超越人类"。各方对 AGI 时间线分歧巨大：乐观派（Altman）：2~3年；悲观派：20年+；LeCun 认为当前路线根本无法达到 AGI。'},{term:"Token Economy",en:"Token Economy",cat:"行业黑话",level:"进阶",color:"#e879f9",short:'以 Token 消耗量为核心的 AI 商业模式，类似云计算的"按量付费"',detail:"当前主流 API 定价：输入 Token vs 输出 Token（输出更贵，因计算量更大）。Token 价格每年下降 80%+（规模效应+竞争）。对投资人来说，关注 Token 成本曲线和毛利率走势至关重要。"},{term:"对齐（Alignment）",en:"Alignment",cat:"行业黑话",level:"进阶",color:"#e879f9",short:"让 AI 系统的行为符合人类价值观和意图，是 AI 安全研究的核心议题",detail:'技术层面：RLHF、Constitutional AI、DPO 等。哲学层面：如何定义"人类价值观"？谁代表人类？Anthropic 是最重视对齐研究的商业公司，将其作为核心差异化竞争力。'},{term:"OpenAI vs Anthropic",en:"OpenAI vs Anthropic",cat:"公司/产品",level:"入门",color:"#38bdf8",short:"OpenAI：GPT系列，商业化激进；Anthropic：Claude系列，安全研究为先",detail:"Anthropic 由 OpenAI 前员工（Dario、Daniela Amodei 等）2021年创立，融资超 70 亿美元（Amazon 领投）。OpenAI 估值超 1500 亿美元。两家公司代表了 AI 发展的两种哲学：激进扩展 vs 谨慎安全。"},{term:"DeepSeek 震撼",en:"DeepSeek Moment",cat:"公司/产品",level:"入门",color:"#38bdf8",short:"2025年初，中国 DeepSeek 以极低成本训练出媲美 GPT-4 的模型，震惊全球",detail:"DeepSeek R1 训练成本约 600 万美元（vs OpenAI 数亿美元），英伟达股价单日暴跌 17%。核心创新：MLA（多头潜在注意力）、MoE 架构高效训练、强化学习推理。引发全球对 AI 算力需求预判的重新审视。"},{term:"Hugging Face",en:"Hugging Face",cat:"公司/产品",level:"入门",color:"#38bdf8",short:"AI 领域的 GitHub，开源模型、数据集、演示的最大社区平台",detail:"估值 45 亿美元。托管超 50 万个模型、10 万个数据集。Transformers 库是 AI 工程师日常工具。在开源 AI 生态中的地位类似 GitHub 之于代码，几乎不可绕过。"},{term:"NVIDIA 的护城河",en:"NVIDIA Moat",cat:"公司/产品",level:"入门",color:"#38bdf8",short:"CUDA 生态是 NVIDIA 最深的护城河，不仅是硬件，更是 20 年的软件积累",detail:"H100 GPU 供不应求，租用价格 $2~4/小时。竞品 AMD MI300X、Google TPU 在算力上接近，但 CUDA 生态（框架、库、工具链、工程师习惯）短期无法复制。CUDA 开发者超过 400 万。"},{term:"开源 vs 闭源",en:"Open vs Closed Source",cat:"公司/产品",level:"入门",color:"#38bdf8",short:"Meta 开源 LLaMA 系列，OpenAI/Anthropic 闭源，两种路线各有逻辑",detail:"Meta 开源逻辑：加速 AI 生态，让更多人在 LLaMA 上构建 → Meta 平台受益；且开源有利于监管/监督。OpenAI 闭源逻辑：能力即护城河，商业化优先。争议：开源是否会加速 AI 危险扩散？"}].filter(t=>("全部"===n||t.cat===n)&&(""===e||t.term.includes(e)||t.en.toLowerCase().includes(e.toLowerCase())||t.short.includes(e)));return(0,o.jsxs)("div",{children:[(0,o.jsxs)("div",{className:"flex flex-col md:flex-row gap-4 mb-6",children:[(0,o.jsx)("input",{type:"text",placeholder:"搜索术语、英文名、描述...",value:e,onChange:e=>t(e.target.value),className:"flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50"}),(0,o.jsx)("div",{className:"flex flex-wrap gap-2",children:["全部","模型概念","训练术语","工程部署","评测基准","行业黑话","公司/产品"].map(e=>(0,o.jsx)("button",{onClick:()=>r(e),className:`px-3 py-1.5 rounded-full text-xs font-medium transition-all ${n===e?"bg-blue-500 text-white":"card-glass text-slate-400 hover:text-white"}`,children:e},e))})]}),(0,o.jsxs)("p",{className:"text-xs text-slate-500 mb-4",children:["共 ",l.length," 个术语 · 点击卡片展开详细解释"]}),(0,o.jsx)(P,{terms:l,levelColors:{入门:"#34d399",进阶:"#f59e0b",专家:"#ef4444"}})]})}function P({terms:e,levelColors:t}){let[n,r]=(0,i.useState)(null);return(0,o.jsx)("div",{className:"grid md:grid-cols-2 gap-3",children:e.map((e,l)=>(0,o.jsxs)("div",{className:"card-glass rounded-xl p-4 cursor-pointer hover:bg-white/5 trans deA:{label:"开源将主导",icon:"🌍",color:"#34d399",args:["DeepSeek、LLaMA 3.1 已证明开源可以 90% 接近闭源能力，且成本更低","大量企业因为数据安全、合规要求必须私有化部署，开源是唯一选择","开源生态（Hugging Face、Ollama、vLLM）的工程繁荣度远超闭源生态","历史规律：操作系统（Linux vs Windows Server）最终开源在服务器端胜出"]},sideB:{label:"闭源前沿将保持优势",icon:"🔒",color:"#f59e0b",args:["前沿能力（Frontier Models）仍有显著差距，闭源持续领先 6~18 个月","闭源的数据飞轮（用户反馈数据）无法被开源复制","安全对齐、RLHF 的最佳实践需要持续人工标注，是隐形护城河","企业大客户愿意为 SLA 保证、安全合规、技术支持付溢价"]},verdict:'大概率走向分层：前沿研究（闭源）+ 行业应用（开源精调）并行。闭源的护城河将从"模型能力"转移到"系统、数据、生态"。'},{title:"AI 会取代程序员吗？",icon:"💻",color:"#a78bfa",tag:"社会影响争论",context:'Cursor、GitHub Copilot、Devin 等 AI 编程工具让"AI 写代码"从概念变成日常。SWE-bench 上 AI 已能解决 70%+ 的真实 Bug。',sideA:{label:"将大幅改变编程职业",icon:"🤖",color:"#ef4444",args:["SWE-bench：Claude 3.7 已能自主解决 70%+ 真实 GitHub Issue，还在快速提升","初级程序员（CRUD、简单功能）的需求将大幅减少，公司招聘量已在下降","Vibe Coding 让非程序员能构建完整应用，降低了编程的入门门槛","软件公司的人效比正在急剧提升（同等产出所需工程师减少）"]},sideB:{label:"程序员需求将持续增长",icon:"👨‍💻",color:"#34d399",args:["AI 代码质量良莠不齐，系统架构、安全审查、性能优化仍高度依赖人类","软件需求本身在爆炸式增长（因 AI 降低了门槛），蛋糕更大了","历史上每次生产力革命（IDE、框架、云计算）都让程序员更多而非更少","AI 工具让 1 个工程师做 5 个人的工作，公司需要更多懂得调用 AI 的工程师"]},verdict:"共识：初级、重复性编程工作将大幅萎缩；能与 AI 协作、负责架构和质量的高级工程师价值将提升。职业转型压力是真实的。"},{title:"AGI 几年后到来？",icon:"🌐",color:"#e879f9",tag:"终极问题",context:"Sam Altman 预测 3~5 年内 AGI 到来；LeCun 认为当前路线根本无法到达 AGI；Hinton 则因 AI 风险而忧虑。时间线争论代表了对 AI 本质的根本分歧。",sideA:{label:"3-7年（乐观派）",icon:"🚀",color:"#34d399",args:["Scaling 曲线若继续，到 2027-2028 年的模型可能在几乎所有脑力工作上超越普通人","o3 已在某些测试上表现超越博士水平，趋势在加速","AI 自身可以加速 AI 研究（AI-assisted AI research），可能出现非线性突破","Altman、Hassabis（DeepMind CEO）均公开表达了 5 年内 AGI 的预期"]},sideB:{label:"10年以上或不可能（悲观派）",icon:"🧱",color:"#f59e0b",args:['LLM 缺乏真正的世界模型和因果推理，只是"高级自动补全"',"Benchmark 上的成功可能是数据污染或浅层模式匹配，不代表真正理解","AGI 需要具身、持续学习、跨任务迁移等能力，当前架构均不具备",'历史上 AI 冬天多次出现，每次都是在"AGI 即将到来"的预期后']},verdict:'争论的核心是对"AGI"定义的分歧，以及当前 LLM 是"真理解"还是"复杂模式匹配"的哲学争议。投资时宜保持不可知论，聚焦当下可落地的价值。'},{title:"中美 AI 差距有多大？",icon:"🌏",color:"#60a5fa",tag:"地缘政治焦点",context:'DeepSeek 的出现改变了"中国落后美国 1-2 年"的判断。但芯片出口管制（H100 禁售）对中国 AI 发展的长期影响仍在争论中。',sideA:{label:"中国快速追赶，差距在缩小",ico
