<!-- shuaiqing.xyz home button (injected v1.2.0) -->
<style id="sq-home-btn-style">
  .sq-home-btn{
    position:fixed;top:16px;left:16px;z-index:99999;
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 13px 7px 11px;border-radius:999px;
    background:rgba(15,15,17,.78);
    -webkit-backdrop-filter:saturate(180%) blur(14px);
    backdrop-filter:saturate(180%) blur(14px);
    border:1px solid rgba(255,255,255,.12);
    color:#fafafa;text-decoration:none;
    font:500 12.5px/1 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    letter-spacing:.01em;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
    transition:transform .18s ease,background .18s ease,box-shadow .18s ease;
    cursor:pointer
  }
  .sq-home-btn:hover{transform:translateY(-1px);background:rgba(15,15,17,.92);box-shadow:0 6px 20px rgba(0,0,0,.25)}
  .sq-home-btn:active{transform:translateY(0)}
  .sq-home-btn svg{width:13px;height:13px;flex-shrink:0;transition:transform .18s ease}
  .sq-home-btn:hover svg{transform:translateX(-2px)}
  .sq-home-btn b{font-weight:500}
  .sq-home-btn em{font-style:normal;opacity:.62;font-weight:400}
  @media (max-width:600px){
    .sq-home-btn{top:12px;left:12px;padding:7px 11px}
    .sq-home-btn .sq-label{display:none}
  }
  @media print{ .sq-home-btn{display:none} }
</style>

\u{6BDB}\u{6CFD}\u{4E1C}\u{7684}\u{7ED3}\u{8BBA}\u{662F}\u{FF1A}**\u{4E2D}\u{56FD}\u{9769}\u{547D}\u{5FC5}\u{987B}\u{4F9D}\u{9760}\u{5DE5}\u{4EBA}\u{9636}\u{7EA7}\u{9886}\u{5BFC}\u{FF0C}\u{4EE5}\u{519C}\u{6C11}\u{4E3A}\u{4E3B}\u{529B}\u{519B}\u{FF0C}\u{8054}\u{5408}\u{5C0F}\u{8D44}\u{4EA7}\u{9636}\u{7EA7}\u{548C}\u{6C11}\u{65CF}\u{8D44}\u{4EA7}\u{9636}\u{7EA7}\u{FF0C}\u{5B64}\u{7ACB}\u{548C}\u{6253}\u{51FB}\u{5927}\u{5730}\u{4E3B}\u{3001}\u{5927}\u{4E70}\u{529E}\u{548C}\u{5E1D}\u{56FD}\u{4E3B}\u{4E49}\u{3002}** \u{8FD9}\u{4E2A}\u{5206}\u{6790}\u{5960}\u{5B9A}\u{4E86}\u{4E2D}\u{56FD}\u{9769}\u{547D}\u{7684}\u{9636}\u{7EA7}\u{8DEF}\u{7EBF}\u{57FA}\u{7840}\u{FF0C}\u{8BA9}\u{515A}\u{660E}\u{767D}\u{4E86}"\u{4ECE}\u{54EA}\u{91CC}\u{6765}\u{529B}\u{91CF}\u{3001}\u{5411}\u{8C01}\u{5F00}\u{70AE}"\u{7684}\u{6839}\u{672C}\u{95EE}\u{9898}\u{3002}`,quotes:["谁是我们的敌人？谁是我们的朋友？这个问题是革命的首要问题。","一切勾结帝国主义的军阀、官僚、买办阶级、大地主阶级以及附属于他们的一部分反动知识界，是我们的敌人。工业无产阶级是我们革命的领导力量。","中国无产阶级、农民、知识分子和其他小资产阶级，乃是决定国家命运的基本的势力。"],significance:'这篇文章是中国共产党阶级分析方法的奠基之作，首次系统地回答了"依靠谁革命"的问题，确立了工农联盟的革命路线，对此后的土地革命、抗日战争、解放战争都有深远指导意义。'},{id:"v1-02",title:"湖南农民运动考察报告",year:1927,month:3,volume:1,tags:["政治","经济"],background:'1927年初，湖南农民运动风起云涌，农民自发组织起来，打倒土豪劣绅、分田分地。但党内和社会上对此争议很大：国民党右派说农民"过激"、"暴动"；党内一些人也认为农民运动"过火"、"糟得很"，担心影响国共合作。毛泽东亲赴湖南五县进行了32天的实地考察，走访农村，与农民同吃同住，写下这篇震撼人心的报告。',summary:`\u{8FD9}\u{7BC7}\u{62A5}\u{544A}\u{662F}\u{6BDB}\u{6CFD}\u{4E1C}\u{4E3A}\u{519C}\u{6C11}\u{8FD0}\u{52A8}"\u{6B63}\u{540D}"\u{7684}\u{5BA3}\u{8A00}\u{4E66}\u{3002}\u{4ED6}\u{5F00}\u{7BC7}\u{5C31}\u{9488}\u{950B}\u{76F8}\u{5BF9}\u{5730}\u{8BF4}\u{FF1A}"\u{5F88}\u{77ED}\u{7684}\u{65F6}\u{95F4}\u{5185}\u{FF0C}\u{5C06}\u{6709}\u{51E0}\u{4E07}\u{4E07}\u{519C}\u{6C11}\u{4ECE}\u{4E2D}\u{56FD}\u{4E2D}\u{90E8}\u{3001}\u{5357}\u{90E8}\u{548C}\u{5317}\u{90E8}\u{5404}\u{7701}\u{8D77}\u{6765}\u{FF0C}\u{5176}\u{52BF}\u{5982}\u{66B4}\u{98CE}\u{9AA4}\u{96E8}\u{FF0C}\u{8FC5}\u{731B}\u{5F02}\u{5E38}\u{FF0C}\u{65E0}\u{8BBA}\u{4EC0}\u{4E48}\u{5927}\u{7684}\u{529B}\u{91CF}\u{90FD}\u{5C06}\u{538B}\u{6291}\u{4E0D}\u{4F4F}\u{3002}"

**\u{519C}\u{6C11}\u{8FD0}\u{52A8}"\u{7CDF}\u{5F97}\u{5F88}"\u{8FD8}\u{662F}"\u{597D}\u{5F97}\u{5F88}"\u{FF1F}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{8BF4}\u{FF0C}\u{90A3}\u{4E9B}\u{8BF4}\u{519C}\u{6C11}\u{8FD0}\u{52A8}"\u{7CDF}\u{5F97}\u{5F88}"\u{7684}\u{4EBA}\u{FF0C}\u{662F}\u{7AD9}\u{5728}\u{5730}\u{4E3B}\u{9636}\u{7EA7}\u{7ACB}\u{573A}\u{4E0A}\u{8BF4}\u{8BDD}\u{7684}\u{3002}\u{4ECE}\u{9769}\u{547D}\u{7684}\u{7ACB}\u{573A}\u{770B}\u{FF0C}\u{519C}\u{6C11}\u{8FD0}\u{52A8}"\u{597D}\u{5F97}\u{5F88}"\u{FF01}\u{519C}\u{6C11}\u{6240}\u{505A}\u{7684}\u{FF0C}\u{6B63}\u{662F}\u{9769}\u{547D}\u{9700}\u{8981}\u{7684}\u{3002}

**\u{519C}\u{6751}\u{9769}\u{547D}\u{7684}14\u{4EF6}\u{5927}\u{4E8B}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{7EC6}\u{81F4}\u{63CF}\u{8FF0}\u{4E86}\u{519C}\u{6C11}\u{8FD0}\u{52A8}\u{7684}14\u{6761}\u{6210}\u{5C31}\u{FF1A}\u{63A8}\u{7FFB}\u{5730}\u{4E3B}\u{653F}\u{6743}\u{3001}\u{6253}\u{5012}\u{571F}\u{8C6A}\u{52A3}\u{7EC5}\u{3001}\u{6253}\u{5012}\u{6B66}\u{88C5}\u{5730}\u{4E3B}\u{3001}\u{63A8}\u{7FFB}\u{7960}\u{5802}\u{65CF}\u{6743}\u{3001}\u{63A8}\u{7FFB}\u{795E}\u{6743}\u{FF08}\u{8FF7}\u{4FE1}\u{FF09}\u{3001}\u{63A8}\u{7FFB}\u{7537}\u{6743}\u{FF08}\u{5987}\u{5973}\u{89E3}\u{653E}\u{FF09}\u{7B49}\u{7B49}\u{3002}\u{4ED6}\u{628A}\u{8FD9}\u{4E9B}\u{603B}\u{7ED3}\u{4E3A}\u{653F}\u{6CBB}\u{4E0A}\u{7684}\u{89E3}\u{653E}\u{3001}\u{7ECF}\u{6D4E}\u{4E0A}\u{7684}\u{89E3}\u{653E}\u{3001}\u{6587}\u{5316}\u{4E0A}\u{7684}\u{89E3}\u{653E}\u{3002}

**\u{4E00}\u{4E2A}\u{6838}\u{5FC3}\u{5224}\u{65AD}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{63D0}\u{51FA}\u{4E00}\u{4E2A}\u{8457}\u{540D}\u{8BBA}\u{65AD}\u{FF1A}**\u{9769}\u{547D}\u{4E0D}\u{662F}\u{8BF7}\u{5BA2}\u{5403}\u{996D}\u{FF0C}\u{4E0D}\u{662F}\u{7ED8}\u{753B}\u{7EE3}\u{82B1}\u{FF0C}\u{4E0D}\u{80FD}\u{90A3}\u{6837}\u{96C5}\u{81F4}\u{FF0C}\u{90A3}\u{6837}\u{4ECE}\u{5BB9}\u{4E0D}\u{8FEB}\u{FF0C}\u{6587}\u{8D28}\u{5F6C}\u{5F6C}\u{FF0C}\u{90A3}\u{6837}\u{6E29}\u{826F}\u{606D}\u{4FED}\u{8BA9}\u{3002}\u{9769}\u{547D}\u{662F}\u{66B4}\u{52A8}\u{FF0C}\u{662F}\u{4E00}\u{4E2A}\u{9636}\u{7EA7}\u{63A8}\u{7FFB}\u{53E6}\u{4E00}\u{4E2A}\u{9636}\u{7EA7}\u{7684}\u{66B4}\u{70C8}\u{7684}\u{884C}\u{52A8}\u{3002}**

\u{4ED6}\u{8FD8}\u{8BF4}\u{FF1A}\u{4E2D}\u{56FD}\u{9769}\u{547D}\u{4E2D}\u{FF0C}\u{519C}\u{6C11}\u{95EE}\u{9898}\u{662F}\u{4E2D}\u{5FC3}\u{95EE}\u{9898}\u{3002}\u{519C}\u{6C11}\u{82E5}\u{8D77}\u{6765}\u{FF0C}\u{5730}\u{4E3B}\u{9636}\u{7EA7}\u{7684}\u{653F}\u{6743}\u{5C31}\u{4E0D}\u{80FD}\u{7EF4}\u{6301}\u{3002}\u{8C01}\u{8D62}\u{5F97}\u{519C}\u{6C11}\u{FF0C}\u{8C01}\u{5C31}\u{8D62}\u{5F97}\u{4E2D}\u{56FD}\u{3002}`,quotes:["革命不是请客吃饭，不是做文章，不是绘画绣花，不能那样雅致，那样从容不迫，文质彬彬，那样温良恭俭让。革命是暴动，是一个阶级推翻一个阶级的暴烈的行动。","很短的时间内，将有几万万农民从中国中部、南部和北部各省起来，其势如暴风骤雨，迅猛异常，无论什么大的力量都将压抑不住。","一切革命同志须知：国民革命需要一个大的农村变动。辛亥革命没有这个变动，所以失败了。"],significance:'这篇报告第一次系统阐明了农民在中国革命中的主力军地位，确立了"农村包围城市"战略的思想基础，也是中国共产党重视农村工作、走群众路线的历史起点。'},{id:"v1-03",title:"井冈山的斗争",year:1928,month:11,volume:1,tags:["军事","政治"],background:'1927年大革命失败，蒋介石发动"四一二"政变，大肆屠杀共产党人。毛泽东领导秋收起义后，率领残部上了井冈山，建立了中国第一个农村革命根据地。面对国民党军队的"会剿"，红军在极端艰苦的条件下坚持斗争。1928年11月，毛泽东给中央写了这封详细报告，总结井冈山斗争的经验教训。',summary:`\u{8FD9}\u{662F}\u{4E00}\u{4EFD}\u{6765}\u{81EA}\u{9769}\u{547D}\u{7B2C}\u{4E00}\u{7EBF}\u{7684}\u{6218}\u{7565}\u{62A5}\u{544A}\u{FF0C}\u{6BDB}\u{6CFD}\u{4E1C}\u{5728}\u{67AA}\u{70AE}\u{58F0}\u{4E2D}\u{601D}\u{8003}\u{FF1A}**\u{9769}\u{547D}\u{5230}\u{5E95}\u{80FD}\u{4E0D}\u{80FD}\u{5728}\u{519C}\u{6751}\u{575A}\u{6301}\u{4E0B}\u{53BB}\u{FF1F}\u{519C}\u{6751}\u{6839}\u{636E}\u{5730}\u{7684}\u{51FA}\u{8DEF}\u{5728}\u{54EA}\u{91CC}\u{FF1F}**

**\u{7EA2}\u{8272}\u{653F}\u{6743}\u{4E3A}\u{4EC0}\u{4E48}\u{80FD}\u{5B58}\u{5728}\u{FF1F}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{63D0}\u{51FA}\u{4E86}\u{4E00}\u{4E2A}\u{91CD}\u{8981}\u{7406}\u{8BBA}\u{FF1A}\u{4E2D}\u{56FD}\u{662F}\u{4E00}\u{4E2A}\u{653F}\u{6CBB}\u{7ECF}\u{6D4E}\u{53D1}\u{5C55}\u{4E0D}\u{5E73}\u{8861}\u{7684}\u{534A}\u{6B96}\u{6C11}\u{5730}\u{5927}\u{56FD}\u{FF0C}\u{5404}\u{5730}\u{519B}\u{9600}\u{6DF7}\u{6218}\u{FF0C}\u{4F7F}\u{5F97}\u{654C}\u{4EBA}\u{65E0}\u{6CD5}\u{96C6}\u{4E2D}\u{529B}\u{91CF}\u{6D88}\u{706D}\u{9769}\u{547D}\u{6839}\u{636E}\u{5730}\u{3002}\u{53EA}\u{8981}\u{6709}\u{7FA4}\u{4F17}\u{57FA}\u{7840}\u{3001}\u{515A}\u{7684}\u{9886}\u{5BFC}\u{3001}\u{6B66}\u{88C5}\u{529B}\u{91CF}\u{FF0C}\u{7EA2}\u{8272}\u{653F}\u{6743}\u{5C31}\u{80FD}\u{5728}"\u{767D}\u{8272}\u{653F}\u{6743}\u{5305}\u{56F4}"\u{4E2D}\u{5B58}\u{5728}\u{5E76}\u{53D1}\u{5C55}\u{3002}\u{8FD9}\u{662F}\u{540E}\u{6765}"\u{519C}\u{6751}\u{5305}\u{56F4}\u{57CE}\u{5E02}"\u{6218}\u{7565}\u{7684}\u{7406}\u{8BBA}\u{5148}\u{58F0}\u{3002}

**\u{571F}\u{5730}\u{9769}\u{547D}\u{7684}\u{5177}\u{4F53}\u{505A}\u{6CD5}**

\u{62A5}\u{544A}\u{8BE6}\u{7EC6}\u{63CF}\u{8FF0}\u{4E86}\u{8FB9}\u{754C}\u{5730}\u{533A}\u{7684}\u{571F}\u{5730}\u{5206}\u{914D}\u{65B9}\u{6CD5}\u{FF1A}\u{6309}\u{4EBA}\u{53E3}\u{5E73}\u{5747}\u{5206}\u{914D}\u{FF0C}\u{597D}\u{574F}\u{642D}\u{914D}\u{3002}\u{5730}\u{4E3B}\u{4E5F}\u{5206}\u{5230}\u{4E00}\u{4EFD}\u{FF0C}\u{8BA9}\u{4ED6}\u{4EEC}\u{81EA}\u{98DF}\u{5176}\u{529B}\u{3002}\u{8FD9}\u{662F}\u{4E2D}\u{56FD}\u{5386}\u{53F2}\u{4E0A}\u{771F}\u{6B63}\u{610F}\u{4E49}\u{4E0A}\u{7684}\u{571F}\u{5730}\u{9769}\u{547D}\u{7684}\u{7B2C}\u{4E00}\u{6B21}\u{5B9E}\u{8DF5}\u{603B}\u{7ED3}\u{3002}

**\u{7EA2}\u{519B}\u{5EFA}\u{8BBE}\u{7684}\u{95EE}\u{9898}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{5766}\u{627F}\u{4E86}\u{7EA2}\u{519B}\u{7684}\u{79CD}\u{79CD}\u{95EE}\u{9898}\u{FF1A}\u{58EB}\u{5175}\u{6765}\u{6E90}\u{590D}\u{6742}\u{3001}\u{6D41}\u{6C13}\u{4E60}\u{6C14}\u{3001}\u{5404}\u{79CD}\u{975E}\u{65E0}\u{4EA7}\u{9636}\u{7EA7}\u{601D}\u{60F3}\u{3002}\u{4F46}\u{4ED6}\u{6709}\u{4FE1}\u{5FC3}\u{9760}\u{653F}\u{6CBB}\u{6559}\u{80B2}\u{3001}\u{4E25}\u{683C}\u{7EAA}\u{5F8B}\u{6765}\u{6539}\u{9020}\u{3002}**\u{4ED6}\u{63D0}\u{51FA}"\u{4E09}\u{5927}\u{7EAA}\u{5F8B}\u{516D}\u{9879}\u{6CE8}\u{610F}"**\u{FF08}\u{540E}\u{53D1}\u{5C55}\u{4E3A}\u{4E09}\u{5927}\u{7EAA}\u{5F8B}\u{516B}\u{9879}\u{6CE8}\u{610F}\u{FF09}\u{FF0C}\u{5960}\u{5B9A}\u{4E86}\u{4EBA}\u{6C11}\u{519B}\u{961F}\u{5EFA}\u{519B}\u{7684}\u{57FA}\u{77F3}\u{3002}

**\u{4E00}\u{4E2A}\u{5386}\u{53F2}\u{6027}\u{7684}\u{575A}\u{5B88}**

\u{62A5}\u{544A}\u{7684}\u{5B57}\u{91CC}\u{884C}\u{95F4}\u{900F}\u{9732}\u{51FA}\u{5DE8}\u{5927}\u{7684}\u{56F0}\u{96BE}\u{FF1A}\u{7F3A}\u{8863}\u{5C11}\u{98DF}\u{3001}\u{5F39}\u{836F}\u{532E}\u{4E4F}\u{3001}\u{4F24}\u{4EA1}\u{60E8}\u{91CD}\u{3002}\u{4F46}\u{6BDB}\u{6CFD}\u{4E1C}\u{6CA1}\u{6709}\u{60B2}\u{89C2}\u{FF0C}\u{4ED6}\u{76F8}\u{4FE1}\u{FF1A}**\u{661F}\u{661F}\u{4E4B}\u{706B}\u{FF0C}\u{53EF}\u{4EE5}\u{71CE}\u{539F}\u{3002}**`,quotes:["边界红旗子始终不倒，不但表示了共产党的力量，而且表示了统治阶级的破产。","军队须和政府机关及人民群众打成一片，要密切联系群众，才能在艰难困苦中坚持下去。","我们中国革命和革命根据地的发展，不是直线的，而是曲折的。"],significance:'这篇报告系统总结了井冈山斗争经验，第一次提出红色政权理论，是"农村包围城市、武装夺取政权"革命道路的重要理论来源，奠定了中国革命成功的战略基础。'},{id:"v1-04",title:"关于纠正党内的错误思想",year:1929,month:12,volume:1,tags:["党建","军事"],background:'1929年，红四军内部存在严重的思想问题：有人把党的领导看成可有可无，有人搞极端民主化（凡事投票，不服从命令），有人搞个人英雄主义，有人主张"流寇主义"（到处打游击不建根据地）。这些思想严重削弱了军队的战斗力和党的领导力。1929年12月，毛泽东在古田会议上作了这个报告。',summary:`**\u{53E4}\u{7530}\u{4F1A}\u{8BAE}\u{51B3}\u{8BAE}**\u{2014}\u{2014}\u{8FD9}\u{662F}\u{5EFA}\u{8BBE}\u{65B0}\u{578B}\u{4EBA}\u{6C11}\u{519B}\u{961F}\u{7684}\u{7EB2}\u{9886}\u{6027}\u{6587}\u{4EF6}\u{3002}\u{6BDB}\u{6CFD}\u{4E1C}\u{9488}\u{5BF9}\u{5F53}\u{65F6}\u{7EA2}\u{519B}\u{4E2D}\u{5B58}\u{5728}\u{7684}\u{5404}\u{79CD}\u{9519}\u{8BEF}\u{601D}\u{60F3}\u{FF0C}\u{9010}\u{4E00}\u{5206}\u{6790}\u{3001}\u{9010}\u{4E00}\u{6279}\u{5224}\u{3001}\u{7ED9}\u{51FA}\u{89E3}\u{51B3}\u{529E}\u{6CD5}\u{3002}

\u{6BDB}\u{6CFD}\u{4E1C}\u{8BF4}\u{FF0C}\u{6559}\u{6761}\u{4E3B}\u{4E49}\u{8005}\u{628A}\u{4E66}\u{672C}\u{4E0A}\u{7684}\u{7ED3}\u{8BBA}\u{5F53}\u{4F5C}\u{4E0D}\u{53D8}\u{7684}\u{771F}\u{7406}\u{FF0C}\u{4E0D}\u{7BA1}\u{5B9E}\u{9645}\u{60C5}\u{51B5}\u{FF0C}\u{8FD9}\u{662F}\u{53CD}\u{9A6C}\u{514B}\u{601D}\u{4E3B}\u{4E49}\u{7684}\u{3002}\u{9A6C}\u{514B}\u{601D}\u{4E3B}\u{4E49}\u{7684}\u{7CBE}\u{9AD3}\u{FF0C}\u{6070}\u{6070}\u{662F}\u{4E00}\u{5207}\u{4ECE}\u{5B9E}\u{9645}\u{51FA}\u{53D1}\u{3002}`,quotes:["人的正确思想是从哪里来的？是从天上掉下来的吗？不是。是自己头脑里固有的吗？不是。人的正确思想，只能从社会实践中来。","通过实践而发现真理，又通过实践而证实真理和发展真理。","如果有了正确的理论，只是把它空谈一阵，束之高阁，并不实行，那么，这种理论再好也是没有意义的。"],significance:'《实践论》是马克思主义认识论与中国革命实践相结合的哲学经典，确立了"实践是检验真理的唯一标准"这一根本原则，为反对教条主义提供了哲学武器，影响了几代中国人的思维方式。'},{id:"v2-02",title:"矛盾论",year:1937,month:8,volume:2,tags:["哲学"],background:"与《实践论》同期，毛泽东在延安抗日军政大学的哲学讲课中写成《矛盾论》。这篇文章针对党内的形而上学思想（用孤立、静止的观点看问题），系统阐述了唯物辩证法的核心——矛盾规律，即对立统一规律。",summary:`\u{300A}\u{77DB}\u{76FE}\u{8BBA}\u{300B}\u{662F}\u{6BDB}\u{6CFD}\u{4E1C}\u{54F2}\u{5B66}\u{6700}\u{6838}\u{5FC3}\u{7684}\u{8457}\u{4F5C}\u{FF0C}\u{6559}\u{4F1A}\u{4EBA}\u{7528}"\u{77DB}\u{76FE}"\u{7684}\u{773C}\u{5149}\u{770B}\u{4E16}\u{754C}\u{3002}

**\u{77DB}\u{76FE}\u{7684}\u{4E3B}\u{8981}\u{65B9}\u{9762}\u{548C}\u{6B21}\u{8981}\u{65B9}\u{9762}**

\u{77DB}\u{76FE}\u{53CC}\u{65B9}\u{65E2}\u{5BF9}\u{7ACB}\u{53C8}\u{7EDF}\u{4E00}\u{FF1A}\u{5BF9}\u{7ACB}\u{662F}\u{6597}\u{4E89}\u{6027}\u{FF0C}\u{7EDF}\u{4E00}\u{662F}\u{540C}\u{4E00}\u{6027}\u{3002}\u{6CA1}\u{6709}\u{6597}\u{4E89}\u{FF0C}\u{77DB}\u{76FE}\u{4E0D}\u{80FD}\u{53D1}\u{5C55}\u{FF1B}\u{6CA1}\u{6709}\u{7EDF}\u{4E00}\u{FF0C}\u{53CC}\u{65B9}\u{4E0D}\u{80FD}\u{5171}\u{5B58}\u{3002}\u{9769}\u{547D}\u{4E2D}\u{8981}\u{5584}\u{4E8E}\u{5229}\u{7528}\u{77DB}\u{76FE}\u{FF0C}\u{5316}\u{654C}\u{4E3A}\u{53CB}\u{FF0C}\u{5229}\u{7528}\u{654C}\u{4EBA}\u{5185}\u{90E8}\u{7684}\u{77DB}\u{76FE}\u{3002}`,quotes:["事物的矛盾法则，即对立统一的法则，是唯物辩证法的最根本的法则。","矛盾存在于一切事物的发展过程中；每一事物的发展过程中存在着自始至终的矛盾运动。","具体问题具体分析，是马克思主义活的灵魂。"],significance:'《矛盾论》系统阐述了辩证唯物主义的核心规律，是中国化马克思主义哲学的奠基之作，"抓主要矛盾"、"具体问题具体分析"成为中国人处理复杂问题的基本思维工具。'},{id:"v2-03",title:"论持久战",year:1938,month:5,volume:2,tags:["军事","政治"],background:'1938年5月，抗日战争已经打了将近一年。日军占领了北平、上海、南京等大城市，国民政府迁往武汉。党内和社会上出现两种极端思想：一是"亡国论"（中国必败，不如早点投降）；二是"速胜论"（中国一定能速胜，不用担心）。毛泽东认为这两种看法都是错误的，花了9天9夜写出这部战略巨著。',summary:`\u{8FD9}\u{662F}20\u{4E16}\u{7EAA}\u{4E2D}\u{56FD}\u{6700}\u{91CD}\u{8981}\u{7684}\u{519B}\u{4E8B}\u{6218}\u{7565}\u{8457}\u{4F5C}\u{4E4B}\u{4E00}\u{FF0C}\u{5168}\u{6587}5\u{4E07}\u{4F59}\u{5B57}\u{FF0C}\u{7CFB}\u{7EDF}\u{56DE}\u{7B54}\u{4E86}"\u{6297}\u{65E5}\u{6218}\u{4E89}\u{80FD}\u{4E0D}\u{80FD}\u{6253}\u{8D62}\u{FF1F}\u{600E}\u{4E48}\u{6253}\u{FF1F}"

**\u{4E3A}\u{4EC0}\u{4E48}\u{65E2}\u{4E0D}\u{4F1A}\u{4EA1}\u{56FD}\u{FF0C}\u{4E5F}\u{4E0D}\u{80FD}\u{901F}\u{80DC}\u{FF1F}**

\u{65E5}\u{672C}\u{7684}\u{7279}\u{70B9}\u{FF1A}\u{519B}\u{4E8B}\u{3001}\u{7ECF}\u{6D4E}\u{529B}\u{91CF}\u{5F3A}\u{5927}\u{FF08}\u{5F3A}\u{FF09}\u{FF0C}\u{4F46}\u{6218}\u{4E89}\u{662F}\u{975E}\u{6B63}\u{4E49}\u{7684}\u{FF08}\u{5F31}\u{FF09}\u{FF0C}\u{5730}\u{5C0F}\u{4EBA}\u{5C11}\u{FF0C}\u{8D44}\u{6E90}\u{6709}\u{9650}\u{FF0C}\u{56FD}\u{9645}\u{4E0A}\u{5B64}\u{7ACB}\u{FF08}\u{5F31}\u{FF09}\u{3002}

\u{4E2D}\u{56FD}\u{7684}\u{7279}\u{70B9}\u{FF1A}\u{519B}\u{4E8B}\u{3001}\u{7ECF}\u{6D4E}\u{843D}\u{540E}\u{FF08}\u{5F31}\u{FF09}\u{FF0C}\u{4F46}\u{6218}\u{4E89}\u{662F}\u{6B63}\u{4E49}\u{7684}\u{FF08}\u{5F3A}\u{FF09}\u{FF0C}\u{5730}\u{5927}\u{4EBA}\u{591A}\u{FF0C}\u{8D44}\u{6E90}\u{4E30}\u{5BCC}\u{FF08}\u{5F3A}\u{FF09}\u{FF0C}\u{56FD}\u{9645}\u{4E0A}\u{6709}\u{540C}\u{60C5}\u{FF08}\u{5F3A}\u{FF09}\u{3002}

\u{5F3A}\u{5F31}\u{5BF9}\u{6BD4}\u{FF0C}\u{51B3}\u{5B9A}\u{4E86}\u{FF1A}\u{4E2D}\u{56FD}\u{6253}\u{4E0D}\u{8D62}\u{901F}\u{51B3}\u{6218}\u{FF0C}\u{4F46}\u{4E5F}\u{4E0D}\u{4F1A}\u{4EA1}\u{56FD}\u{3002}\u{6218}\u{4E89}\u{7684}\u{7ED3}\u{5C40}\u{FF0C}\u{662F}**\u{4E2D}\u{56FD}\u{7684}\u{80DC}\u{5229}**\u{FF0C}\u{4F46}\u{8981}\u{7ECF}\u{8FC7}\u{6F2B}\u{957F}\u{7684}\u{8FC7}\u{7A0B}\u{3002}

**\u{7B2C}\u{4E09}\u{9636}\u{6BB5}**\u{FF1A}\u{6218}\u{7565}\u{53CD}\u{653B}\u{3002}\u{4E2D}\u{56FD}\u{529B}\u{91CF}\u{589E}\u{957F}\u{FF0C}\u{65E5}\u{519B}\u{529B}\u{91CF}\u{8870}\u{7AED}\u{FF0C}\u{4E2D}\u{56FD}\u{8F6C}\u{5165}\u{5168}\u{9762}\u{53CD}\u{653B}\u{FF0C}\u{6700}\u{7EC8}\u{80DC}\u{5229}\u{3002}\u{FF08}1944-1945\u{FF09}

**\u{6E38}\u{51FB}\u{6218}\u{7684}\u{6218}\u{7565}\u{5730}\u{4F4D}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{7279}\u{522B}\u{5F3A}\u{8C03}\u{6E38}\u{51FB}\u{6218}\u{7684}\u{4F5C}\u{7528}\u{FF1A}\u{5728}\u{6B63}\u{9762}\u{6218}\u{573A}\u{4E4B}\u{5916}\u{FF0C}\u{8981}\u{5927}\u{89C4}\u{6A21}\u{5F00}\u{5C55}\u{6E38}\u{51FB}\u{6218}\u{FF0C}\u{5728}\u{654C}\u{540E}\u{5EFA}\u{7ACB}\u{6839}\u{636E}\u{5730}\u{FF0C}\u{8BA9}\u{65E5}\u{519B}\u{9677}\u{5165}\u{4EBA}\u{6C11}\u{6218}\u{4E89}\u{7684}\u{6C6A}\u{6D0B}\u{5927}\u{6D77}\u{3002}\u{8FD9}\u{662F}\u{6D88}\u{8017}\u{65E5}\u{519B}\u{3001}\u{79EF}\u{84C4}\u{529B}\u{91CF}\u{7684}\u{5173}\u{952E}\u{3002}

**\u{5175}\u{6C11}\u{662F}\u{80DC}\u{5229}\u{4E4B}\u{672C}**

\u{6218}\u{4E89}\u{7684}\u{6700}\u{7EC8}\u{529B}\u{91CF}\u{6765}\u{6E90}\u{662F}\u{4EBA}\u{6C11}\u{3002}\u{4F9D}\u{9760}\u{5E7F}\u{5927}\u{4EBA}\u{6C11}\u{7FA4}\u{4F17}\u{FF0C}\u{624D}\u{80FD}\u{5B9E}\u{73B0}\u{6301}\u{4E45}\u{6218}\u{3001}\u{6700}\u{7EC8}\u{80DC}\u{5229}\u{3002}`,quotes:["兵民是胜利之本。","战争的伟力之最深厚的根源，存在于民众之中。","抗日战争是持久战，最后胜利是中国的。"],significance:"《论持久战》是中国现代军事战略思想的顶峰之作，对抗日战争的进程作出了准确预判，为全党全军树立了胜利信心，是毛泽东军事思想的集大成之作，在世界军事思想史上也有重要地位。"},{id:"v2-04",title:"中国共产党在民族战争中的地位",year:1938,month:10,volume:2,tags:["政治","党建"],background:"1938年10月，中共六届六中全会在延安召开。此时抗战已进入艰苦的相持阶段，党需要明确自己在民族战争中的角色和立场。毛泽东在这次全会上作了题为《论新阶段》的长篇政治报告，这篇文章是其中的一部分，专门讨论中国共产党的地位和责任。",summary:`\u{8FD9}\u{7BC7}\u{6587}\u{7AE0}\u{56DE}\u{7B54}\u{4E86}\u{4E00}\u{4E2A}\u{91CD}\u{5927}\u{95EE}\u{9898}\u{FF1A}**\u{5728}\u{5168}\u{6C11}\u{65CF}\u{7684}\u{6297}\u{65E5}\u{6218}\u{4E89}\u{4E2D}\u{FF0C}\u{5171}\u{4EA7}\u{515A}\u{5E94}\u{8BE5}\u{5904}\u{4E8E}\u{4EC0}\u{4E48}\u{5730}\u{4F4D}\u{3001}\u{53D1}\u{6325}\u{4EC0}\u{4E48}\u{4F5C}\u{7528}\u{FF1F}**

**\u{5171}\u{4EA7}\u{515A}\u{5FC5}\u{987B}\u{8D77}\u{5148}\u{950B}\u{961F}\u{548C}\u{6A21}\u{8303}\u{4F5C}\u{7528}**

**\u{6B4C}\u{9882}\u{4E0E}\u{66B4}\u{9732}**

\u{6709}\u{4EBA}\u{8BF4}\u{FF0C}\u{6587}\u{827A}\u{5E94}\u{8BE5}\u{63ED}\u{9732}\u{9ED1}\u{6697}\u{3002}\u{6BDB}\u{6CFD}\u{4E1C}\u{8BF4}\u{FF0C}\u{5BF9}\u{4E8E}\u{654C}\u{4EBA}\u{3001}\u{5BF9}\u{4E8E}\u{5E1D}\u{56FD}\u{4E3B}\u{4E49}\u{FF0C}\u{5F53}\u{7136}\u{8981}\u{63ED}\u{9732}\u{FF1B}\u{4F46}\u{5BF9}\u{4E8E}\u{6839}\u{636E}\u{5730}\u{81EA}\u{5DF1}\u{4EBA}\u{FF0C}\u{5E94}\u{8BE5}\u{4EE5}\u{6B4C}\u{9882}\u{4E3A}\u{4E3B}\u{3002}\u{5F53}\u{7136}\u{FF0C}\u{4E5F}\u{53EF}\u{4EE5}\u{6279}\u{8BC4}\u{7F3A}\u{70B9}\u{FF0C}\u{4F46}\u{8981}\u{4ECE}\u{56E2}\u{7ED3}\u{7684}\u{613F}\u{671B}\u{51FA}\u{53D1}\u{FF0C}\u{7ECF}\u{8FC7}\u{6279}\u{8BC4}\u{8FBE}\u{5230}\u{56E2}\u{7ED3}\u{7684}\u{76EE}\u{7684}\u{3002}

\u{6587}\u{827A}\u{8981}\u{666E}\u{53CA}\u{FF0C}\u{8BA9}\u{5DE5}\u{519C}\u{5175}\u{770B}\u{5F97}\u{61C2}\u{3001}\u{559C}\u{6B22}\u{FF1B}\u{4E5F}\u{8981}\u{63D0}\u{9AD8}\u{FF0C}\u{9010}\u{6B65}\u{63D0}\u{5347}\u{7FA4}\u{4F17}\u{7684}\u{6587}\u{5316}\u{6C34}\u{5E73}\u{3002}\u{666E}\u{53CA}\u{662F}\u{57FA}\u{7840}\u{FF0C}\u{63D0}\u{9AD8}\u{662F}\u{76EE}\u{6807}\u{FF0C}\u{4E24}\u{8005}\u{7EDF}\u{4E00}\u{3002}`,quotes:["为什么人的问题，是一个根本的问题，原则的问题。","我们的文学艺术都是为人民大众的，首先是为工农兵的，为工农兵而创作，为工农兵所利用的。","文艺批评有两个标准：一个是政治标准，一个是艺术标准。"],significance:'这篇讲话确立了中国共产党"文艺为人民服务"的基本方针，对新中国文艺事业的发展产生了深远影响，也引发了关于文艺与政治关系的长期争论。'},{id:"v3-05",title:"为人民服务",year:1944,month:9,volume:3,tags:["党建"],background:"1944年9月8日，中共中央警备团战士张思德在烧炭时因炭窑崩塌牺牲。张思德入伍多年，任劳任怨，从不计较个人得失。毛泽东亲赴追悼会，发表了这篇著名的演讲。",summary:`\u{5168}\u{6587}\u{4E0D}\u{8DB3}800\u{5B57}\u{FF0C}\u{5374}\u{6210}\u{4E3A}\u{51E0}\u{5341}\u{5E74}\u{6765}\u{5F71}\u{54CD}\u{4E2D}\u{56FD}\u{4EBA}\u{7CBE}\u{795E}\u{4E16}\u{754C}\u{6700}\u{6DF1}\u{7684}\u{6587}\u{7AE0}\u{4E4B}\u{4E00}\u{FF0C}\u{4E0E}\u{300A}\u{7EAA}\u{5FF5}\u{767D}\u{6C42}\u{6069}\u{300B}\u{300A}\u{611A}\u{516C}\u{79FB}\u{5C71}\u{300B}\u{5408}\u{79F0}"\u{8001}\u{4E09}\u{7BC7}"\u{3002}

**\u{4E3A}\u{4EBA}\u{6C11}\u{670D}\u{52A1}\u{2014}\u{2014}\u{515A}\u{7684}\u{5B97}\u{65E8}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{5728}\u{6587}\u{7AE0}\u{5F00}\u{5934}\u{5C31}\u{660E}\u{786E}\u{5BA3}\u{544A}\u{FF1A}**\u{6211}\u{4EEC}\u{8FD9}\u{4E2A}\u{961F}\u{4F0D}\u{5B8C}\u{5168}\u{662F}\u{4E3A}\u{7740}\u{89E3}\u{653E}\u{4EBA}\u{6C11}\u{7684}\u{FF0C}\u{662F}\u{5F7B}\u{5E95}\u{5730}\u{4E3A}\u{4EBA}\u{6C11}\u{7684}\u{5229}\u{76CA}\u{5DE5}\u{4F5C}\u{7684}\u{3002}** \u{8FD9}\u{4E00}\u{53E5}\u{8BDD}\u{FF0C}\u{9053}\u{51FA}\u{4E86}\u{4E2D}\u{56FD}\u{5171}\u{4EA7}\u{515A}\u{5B58}\u{5728}\u{7684}\u{5168}\u{90E8}\u{610F}\u{4E49}\u{3002}

\u{6BDB}\u{6CFD}\u{4E1C}\u{5F15}\u{7528}\u{53F8}\u{9A6C}\u{8FC1}\u{7684}\u{8BDD}\u{FF1A}"\u{4EBA}\u{56FA}\u{6709}\u{4E00}\u{6B7B}\u{FF0C}\u{6216}\u{91CD}\u{4E8E}\u{6CF0}\u{5C71}\u{FF0C}\u{6216}\u{8F7B}\u{4E8E}\u{9E3F}\u{6BDB}\u{3002}"\u{4ED6}\u{8BF4}\u{FF1A}\u{4E3A}\u{4EBA}\u{6C11}\u{5229}\u{76CA}\u{800C}\u{6B7B}\u{FF0C}\u{5C31}\u{6BD4}\u{6CF0}\u{5C71}\u{8FD8}\u{91CD}\u{FF1B}\u{66FF}\u{6CD5}\u{897F}\u{65AF}\u{5356}\u{529B}\u{FF0C}\u{66FF}\u{5265}\u{524A}\u{4EBA}\u{6C11}\u{548C}\u{538B}\u{8FEB}\u{4EBA}\u{6C11}\u{7684}\u{4EBA}\u{53BB}\u{6B7B}\u{FF0C}\u{5C31}\u{6BD4}\u{9E3F}\u{6BDB}\u{8FD8}\u{8F7B}\u{3002}\u{5F20}\u{601D}\u{5FB7}\u{540C}\u{5FD7}\u{662F}\u{4E3A}\u{4EBA}\u{6C11}\u{5229}\u{76CA}\u{800C}\u{6B7B}\u{7684}\u{FF0C}\u{4ED6}\u{7684}\u{6B7B}\u{662F}\u{6BD4}\u{6CF0}\u{5C71}\u{8FD8}\u{8981}\u{91CD}\u{7684}\u{3002}

**\u{6B63}\u{786E}\u{5BF9}\u{5F85}\u{6279}\u{8BC4}**

\u{6211}\u{4EEC}\u{7684}\u{540C}\u{5FD7}\u{8981}\u{4E92}\u{76F8}\u{5173}\u{5FC3}\u{3001}\u{4E92}\u{76F8}\u{7231}\u{62A4}\u{3001}\u{4E92}\u{76F8}\u{5E2E}\u{52A9}\u{3002}\u{4ECA}\u{540E}\u{6211}\u{4EEC}\u{7684}\u{961F}\u{4F0D}\u{91CC}\u{FF0C}\u{4E0D}\u{7BA1}\u{6B7B}\u{4E86}\u{8C01}\u{FF0C}\u{4E0D}\u{7BA1}\u{662F}\u{708A}\u{4E8B}\u{5458}\u{8FD8}\u{662F}\u{58EB}\u{5175}\u{FF0C}\u{53EA}\u{8981}\u{4ED6}\u{662F}\u{505A}\u{8FC7}\u{4E00}\u{4E9B}\u{6709}\u{76CA}\u{7684}\u{5DE5}\u{4F5C}\u{7684}\u{FF0C}\u{6211}\u{4EEC}\u{90FD}\u{8981}\u{7ED9}\u{4ED6}\u{9001}\u{846C}\u{FF0C}\u{5F00}\u{8FFD}\u{60BC}\u{4F1A}\u{3002}

**\u{4E00}\u{79CD}\u{7CBE}\u{795E}\u{5883}\u{754C}**

"\u{4E3A}\u{4EBA}\u{6C11}\u{670D}\u{52A1}"\u{56DB}\u{4E2A}\u{5B57}\u{FF0C}\u{7B80}\u{5355}\u{5374}\u{6DF1}\u{523B}\u{3002}\u{5B83}\u{8981}\u{6C42}\u{4EBA}\u{8D85}\u{8D8A}\u{4E2A}\u{4EBA}\u{7684}\u{5229}\u{76CA}\u{8BA1}\u{7B97}\u{FF0C}\u{628A}\u{670D}\u{52A1}\u{4ED6}\u{4EBA}\u{5F53}\u{4F5C}\u{4EBA}\u{751F}\u{7684}\u{610F}\u{4E49}\u{548C}\u{4EF7}\u{503C}\u{3002}\u{8FD9}\u{79CD}\u{7CBE}\u{795E}\u{FF0C}\u{5728}\u{4ECA}\u{5929}\u{4ECD}\u{7136}\u{6709}\u{5176}\u{529B}\u{91CF}\u{3002}`,quotes:["我们的共产党和共产党所领导的八路军、新四军，是革命的队伍。我们这个队伍完全是为着解放人民的，是彻底地为人民的利益工作的。","人固有一死，或重于泰山，或轻于鸿毛。为人民利益而死，就比泰山还重；替法西斯卖力，替剥削人民和压迫人民的人去死，就比鸿毛还轻。","为人民服务。"],significance:'《为人民服务》确立了中国共产党的根本宗旨，成为几代中国人的精神信条，"为人民服务"五个字成为中国共产党和中国政府的行动标语，至今仍刻在中南海门楼上。'},{id:"v3-06",title:"论联合政府",year:1945,month:4,volume:3,tags:["政治","统战"],background:"1945年4月，中共七大在延安召开，这是党在解放战争前夕的一次重大会议。此时抗日战争已接近尾声，国共之间的矛盾日趋尖锐。毛泽东在七大上作政治报告，提出建立民主联合政府的主张，批判国民党一党独裁，为战后中国的政治走向定调。",summary:`\u{8FD9}\u{662F}\u{4E2D}\u{5171}\u{4E03}\u{5927}\u{7684}\u{653F}\u{6CBB}\u{62A5}\u{544A}\u{FF0C}\u{6BDB}\u{6CFD}\u{4E1C}\u{7CFB}\u{7EDF}\u{9610}\u{8FF0}\u{4E86}\u{515A}\u{5BF9}\u{6218}\u{540E}\u{4E2D}\u{56FD}\u{7684}\u{653F}\u{6CBB}\u{6784}\u{60F3}\u{3002}

**\u{6218}\u{5C40}\u{7684}\u{6839}\u{672C}\u{8F6C}\u{53D8}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{6307}\u{51FA}\u{FF1A}\u{4E2D}\u{56FD}\u{4EBA}\u{6C11}\u{89E3}\u{653E}\u{519B}\u{7531}\u{6218}\u{7565}\u{9632}\u{5FA1}\u{8F6C}\u{5165}\u{6218}\u{7565}\u{53CD}\u{653B}\u{FF0C}\u{8FD9}\u{662F}\u{4E00}\u{4E2A}\u{5386}\u{53F2}\u{8F6C}\u{6298}\u{70B9}\u{3002}\u{848B}\u{4ECB}\u{77F3}\u{7684}\u{6218}\u{7565}\u{610F}\u{56FE}\u{5F7B}\u{5E95}\u{5931}\u{8D25}\u{FF0C}\u{4ED6}\u{4EE5}\u{4E3A}\u{53EF}\u{4EE5}\u{901F}\u{6218}\u{901F}\u{51B3}\u{6D88}\u{706D}\u{5171}\u{4EA7}\u{515A}\u{FF0C}\u{7ED3}\u{679C}\u{642C}\u{8D77}\u{77F3}\u{5934}\u{7838}\u{4E86}\u{81EA}\u{5DF1}\u{7684}\u{811A}\u{3002}

\u{519B}\u{4E8B}\u{4E0A}\u{FF1A}\u{4EBA}\u{6C11}\u{519B}\u{961F}\u{638C}\u{63E1}\u{4E86}\u{6B63}\u{786E}\u{7684}\u{6218}\u{7565}\u{6218}\u{672F}\u{2014}\u{2014}\u{96C6}\u{4E2D}\u{4F18}\u{52BF}\u{5175}\u{529B}\u{6253}\u{6B7C}\u{706D}\u{6218}\u{FF0C}\u{907F}\u{514D}\u{9632}\u{5B88}\u{FF0C}\u{4EE5}\u{8FD0}\u{52A8}\u{6218}\u{4E3A}\u{4E3B}\u{3002}

\u{653F}\u{6CBB}\u{4E0A}\u{FF1A}\u{571F}\u{5730}\u{6539}\u{9769}\u{6FC0}\u{53D1}\u{4E86}\u{519C}\u{6C11}\u{7684}\u{79EF}\u{6781}\u{6027}\u{FF0C}\u{5E7F}\u{5927}\u{8D2B}\u{519C}\u{79EF}\u{6781}\u{652F}\u{524D}\u{53C2}\u{519B}\u{FF0C}\u{662F}\u{80DC}\u{5229}\u{7684}\u{6839}\u{672C}\u{529B}\u{91CF}\u{3002}

**\u{571F}\u{5730}\u{6539}\u{9769}\u{662F}\u{6839}\u{672C}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{5728}\u{8FD9}\u{7BC7}\u{6587}\u{7AE0}\u{91CC}\u{7279}\u{522B}\u{5F3A}\u{8C03}\u{571F}\u{5730}\u{6539}\u{9769}\u{7684}\u{6218}\u{7565}\u{610F}\u{4E49}\u{FF1A}\u{628A}\u{5730}\u{4E3B}\u{7684}\u{571F}\u{5730}\u{5206}\u{7ED9}\u{519C}\u{6C11}\u{FF0C}\u{8BA9}\u{519C}\u{6C11}\u{771F}\u{6B63}\u{7FFB}\u{8EAB}\u{3002}\u{8FD9}\u{662F}"\u{6316}\u{6389}\u{5C01}\u{5EFA}\u{4E3B}\u{4E49}\u{8FD9}\u{5EA7}\u{5927}\u{5C71}"\u{7684}\u{6839}\u{672C}\u{624B}\u{6BB5}\u{FF0C}\u{4E5F}\u{662F}\u{52A8}\u{5458}\u{6570}\u{4EBF}\u{519C}\u{6C11}\u{652F}\u{6301}\u{9769}\u{547D}\u{7684}\u{5173}\u{952E}\u{3002}

**\u{80DC}\u{5229}\u{7684}\u{4FE1}\u{5FC3}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{8BED}\u{6C14}\u{575A}\u{5B9A}\u{FF1A}\u{518D}\u{8FC7}\u{82E5}\u{5E72}\u{5E74}\u{FF0C}\u{4E2D}\u{56FD}\u{4EBA}\u{6C11}\u{5C31}\u{8981}\u{5728}\u{5168}\u{56FD}\u{8303}\u{56F4}\u{5185}\u{63A8}\u{7FFB}\u{56FD}\u{6C11}\u{515A}\u{7684}\u{7EDF}\u{6CBB}\u{FF0C}\u{5EFA}\u{7ACB}\u{65B0}\u{4E2D}\u{56FD}\u{3002}`,quotes:["中国人民解放军已经在中国这块土地上扭转了美国帝国主义及其走狗蒋介石匪帮进攻的车轮，这是一个历史的转折点。","军队向前进，生产长一寸，加强纪律性，革命无不胜。","这是一个历史的转折点。这是蒋介石的二十年反革命统治由发展到消灭的转折点。"],significance:'这篇报告宣告了解放战争战略反攻的开始，系统总结了人民战争的战略战术，"十大军事原则"也在这一时期形成，成为人民军队作战的基本指导原则。'},{id:"v4-05",title:"在晋绥干部会议上的讲话",year:1948,month:4,volume:4,tags:["政治","党建"],background:'1948年4月，解放战争进入决战前夕。毛泽东在晋绥干部会议上讲话，系统阐述了"新民主主义革命总路线"，明确了中国革命的性质、对象、动力、领导者等根本问题，为即将到来的全国胜利做好思想准备。',summary:`\u{8FD9}\u{7BC7}\u{8BB2}\u{8BDD}\u{662F}\u{6BDB}\u{6CFD}\u{4E1C}\u{5BF9}\u{4E2D}\u{56FD}\u{9769}\u{547D}\u{6027}\u{8D28}\u{7684}\u{6700}\u{5B8C}\u{6574}\u{9610}\u{8FF0}\u{FF0C}\u{603B}\u{7ED3}\u{4E86}\u{65B0}\u{6C11}\u{4E3B}\u{4E3B}\u{4E49}\u{9769}\u{547D}\u{7684}\u{5168}\u{90E8}\u{7406}\u{8BBA}\u{3002}

**\u{65B0}\u{6C11}\u{4E3B}\u{4E3B}\u{4E49}\u{9769}\u{547D}\u{603B}\u{8DEF}\u{7EBF}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{660E}\u{786E}\u{5BA3}\u{5E03}\u{FF1A}**\u{65B0}\u{6C11}\u{4E3B}\u{4E3B}\u{4E49}\u{9769}\u{547D}\u{7684}\u{603B}\u{8DEF}\u{7EBF}\u{662F}\u{FF1A}\u{65E0}\u{4EA7}\u{9636}\u{7EA7}\u{9886}\u{5BFC}\u{7684}\u{FF0C}\u{4EBA}\u{6C11}\u{5927}\u{4F17}\u{7684}\u{FF0C}\u{53CD}\u{5BF9}\u{5E1D}\u{56FD}\u{4E3B}\u{4E49}\u{3001}\u{5C01}\u{5EFA}\u{4E3B}\u{4E49}\u{548C}\u{5B98}\u{50DA}\u{8D44}\u{672C}\u{4E3B}\u{4E49}\u{7684}\u{9769}\u{547D}\u{3002}**

\u{8FD9}\u{4E2A}\u{603B}\u{8DEF}\u{7EBF}\u{6709}\u{4E09}\u{4E2A}\u{5173}\u{952E}\u{8981}\u{7D20}\u{FF1A}
1. **\u{8C01}\u{6765}\u{9886}\u{5BFC}**\u{FF1A}\u{65E0}\u{4EA7}\u{9636}\u{7EA7}\u{FF08}\u{901A}\u{8FC7}\u{5171}\u{4EA7}\u{515A}\u{FF09}
2. **\u{4F9D}\u{9760}\u{8C01}**\u{FF1A}\u{4EBA}\u{6C11}\u{5927}\u{4F17}\u{FF08}\u{5DE5}\u{519C}\u{5175}\u{5B66}\u{5546}\u{5404}\u{754C}\u{FF09}
3. **\u{6253}\u{5012}\u{8C01}**\u{FF1A}\u{5E1D}\u{56FD}\u{4E3B}\u{4E49}+\u{5C01}\u{5EFA}\u{4E3B}\u{4E49}+\u{5B98}\u{50DA}\u{8D44}\u{672C}\u{4E3B}\u{4E49}\u{FF08}\u{4E09}\u{5EA7}\u{5927}\u{5C71}\u{FF09}

**\u{5B98}\u{50DA}\u{8D44}\u{672C}\u{4E3B}\u{4E49}\u{662F}\u{4EC0}\u{4E48}\u{FF1F}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{63D0}\u{51FA}\u{8981}\u{6253}\u{5012}"\u{5B98}\u{50DA}\u{8D44}\u{672C}\u{4E3B}\u{4E49}"\u{FF0C}\u{8FD9}\u{662F}\u{4E00}\u{4E2A}\u{65B0}\u{7684}\u{5206}\u{6790}\u{FF1A}\u{4EE5}\u{848B}\u{4ECB}\u{77F3}\u{4E3A}\u{9996}\u{7684}\u{56FD}\u{6C11}\u{515A}\u{5B98}\u{50DA}\u{FF0C}\u{5229}\u{7528}\u{653F}\u{6743}\u{5927}\u{8086}\u{805A}\u{655B}\u{8D22}\u{5BCC}\u{FF0C}\u{5F62}\u{6210}\u{5784}\u{65AD}\u{6027}\u{8D44}\u{672C}\u{FF0C}\u{538B}\u{69A8}\u{6C11}\u{65CF}\u{8D44}\u{4EA7}\u{9636}\u{7EA7}\u{548C}\u{5E7F}\u{5927}\u{52B3}\u{52A8}\u{4EBA}\u{6C11}\u{3002}\u{6253}\u{5012}\u{5B98}\u{50DA}\u{8D44}\u{672C}\u{4E3B}\u{4E49}\u{FF0C}\u{662F}\u{9769}\u{547D}\u{7684}\u{91CD}\u{8981}\u{4EFB}\u{52A1}\u{4E4B}\u{4E00}\u{3002}

**\u{9769}\u{547D}\u{7684}\u{76EE}\u{6807}**

\u{65B0}\u{6C11}\u{4E3B}\u{4E3B}\u{4E49}\u{9769}\u{547D}\u{5B8C}\u{6210}\u{540E}\u{FF0C}\u{4E2D}\u{56FD}\u{5C06}\u{5EFA}\u{7ACB}\u{4E00}\u{4E2A}\u{5DE5}\u{4EBA}\u{9636}\u{7EA7}\u{9886}\u{5BFC}\u{7684}\u{3001}\u{4EE5}\u{5DE5}\u{519C}\u{8054}\u{76DF}\u{4E3A}\u{57FA}\u{7840}\u{7684}\u{4EBA}\u{6C11}\u{6C11}\u{4E3B}\u{4E13}\u{653F}\u{56FD}\u{5BB6}\u{FF0C}\u{7136}\u{540E}\u{518D}\u{9010}\u{6B65}\u{8D70}\u{5411}\u{793E}\u{4F1A}\u{4E3B}\u{4E49}\u{3002}

**\u{7FA4}\u{4F17}\u{8DEF}\u{7EBF}\u{7684}\u{518D}\u{5F3A}\u{8C03}**

\u{6BDB}\u{6CFD}\u{4E1C}\u{518D}\u{6B21}\u{5F3A}\u{8C03}\u{7FA4}\u{4F17}\u{8DEF}\u{7EBF}\u{FF1A}\u{4E00}\u{5207}\u{4E3A}\u{4E86}\u{7FA4}\u{4F17}\u{FF0C}\u{4E00}\u{5207}\u{4F9D}\u{9760}\u{7FA4}\u{4F17}\u{FF0C}\u{4ECE}\u{7FA4}\u{4F17}\u{4E2D}\u{6765}\u{FF0C}\u{5230}\u{7FA4}\u{4F17}\u{4E2D}\u{53BB}\u{3002}`,quotes:["无产阶级领导的，人民大众的，反对帝国主义、封建主义和官僚资本主义的革命，这就是中国的新民主主义的革命，这就是中国共产党在当前历史阶段的总路线和总政策。","一切为了群众的观点，一切向人民群众负责的观点，相信群众自己解放自己的观点，向人民群众学习的观点，这一切，就是我们的群众观点。","群众是真正的英雄，而我们自己则往往是幼稚可笑的。"],significance:"这篇讲话系统阐述了新民主主义革命总路线，是中国共产党革命理论的集大成，为新中国的建立确立了政治方向，对中国革命的最终胜利起到了重要的思想指导作用。"},{id:"v4-06",title:"将革命进行到底",year:1948,month:12,volume:4,tags:["政治"],background:'1948年底，三大战役（辽沈、淮海、平津）已经开始或即将开始，国民党政权已是强弩之末。这时，蒋介石发出和谈声明，企图以"停战谈判"为借口，争取喘息时间，保留江南半壁，将来东山再起。毛泽东为《人民日报》写了这篇元旦社论，义正辞严地予以驳斥。',summary:`\u{8FD9}\u{662F}\u{89E3}\u{653E}\u{6218}\u{4E89}\u{672B}\u{671F}\u{6700}\u{91CD}\u{8981}\u{7684}\u{4E00}\u{7BC7}\u{653F}\u{8BBA}\u{6587}\u{FF0C}\u{6BDB}\u{6CFD}\u{4E1C}\u{7684}\u{7B14}\u{5982}\u{5200}\u{FF0C}\u{65A9}\u{9489}\u{622A}\u{94C1}\u{FF1A}**\u{9769}\u{547D}\u{5FC5}\u{987B}\u{8FDB}\u{884C}\u{5230}\u{5E95}\u{FF01}**
